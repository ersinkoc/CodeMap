# GitHub Actions workflow to generate and commit codemap on push
name: Update Codemap

on:
  push:
    branches: [main]
    paths: ['src/**']

jobs:
  codemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # Generate compact codemap
      - run: npx codemap --format compact --output .codemap/

      # Commit updated map if changed
      - name: Commit codemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .codemap/
          git diff --staged --quiet || git commit -m "chore: update codemap"
          git push
